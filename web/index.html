<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XF Playground</title>
    <style>
      :root {
        --bg: #1e1e2e;
        --surface: #181825;
        --overlay: #313244;
        --text: #cdd6f4;
        --subtext: #a6adc8;
        --green: #a6e3a1;
        --red: #f38ba8;
        --blue: #89b4fa;
        --mauve: #cba6f7;
        --peach: #fab387;
        --radius: 8px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        border-bottom: 1px solid var(--overlay);
        background: var(--surface);
      }

      header h1 {
        font-size: 18px;
        font-weight: 600;
        color: var(--mauve);
      }

      header h1 span {
        color: var(--subtext);
        font-weight: 400;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        border-radius: var(--radius);
        padding: 6px 16px;
        font-size: 13px;
        font-weight: 500;
        transition: opacity 0.15s;
      }

      button:hover {
        opacity: 0.85;
      }

      .btn-run {
        background: var(--green);
        color: var(--bg);
      }

      .btn-clear {
        background: var(--overlay);
        color: var(--subtext);
      }

      .btn-example {
        background: transparent;
        color: var(--blue);
        padding: 6px 10px;
        font-size: 12px;
        border: 1px solid var(--overlay);
      }

      .btn-example:hover {
        background: var(--overlay);
      }

      main {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      .pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .pane-header {
        padding: 8px 16px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--subtext);
        background: var(--surface);
        border-bottom: 1px solid var(--overlay);
      }

      .editor-pane {
        border-right: 1px solid var(--overlay);
      }

      textarea {
        flex: 1;
        resize: none;
        border: none;
        outline: none;
        background: var(--bg);
        color: var(--text);
        font-family:
          "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", Menlo,
          Consolas, monospace;
        font-size: 14px;
        line-height: 1.6;
        padding: 16px;
        tab-size: 2;
      }

      textarea::placeholder {
        color: var(--overlay);
      }

      #output {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        font-family:
          "SF Mono", "Fira Code", "Cascadia Code", "JetBrains Mono", Menlo,
          Consolas, monospace;
        font-size: 14px;
        line-height: 1.6;
        background: var(--bg);
      }

      .output-line {
        white-space: pre-wrap;
        word-break: break-all;
      }

      .output-error {
        color: var(--red);
      }

      .output-info {
        color: var(--subtext);
        font-style: italic;
      }

      .output-success {
        color: var(--green);
      }

      .divider {
        width: 1px;
        background: var(--overlay);
      }

      .status-bar {
        padding: 6px 20px;
        font-size: 11px;
        color: var(--subtext);
        background: var(--surface);
        border-top: 1px solid var(--overlay);
        display: flex;
        justify-content: space-between;
      }

      .kbd {
        display: inline-block;
        padding: 1px 5px;
        font-size: 11px;
        font-family: inherit;
        background: var(--overlay);
        border-radius: 3px;
        color: var(--subtext);
      }

      @media (max-width: 700px) {
        main {
          flex-direction: column;
        }
        .editor-pane {
          border-right: none;
          border-bottom: 1px solid var(--overlay);
        }
        .pane {
          min-height: 200px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>XF <span>Playground</span></h1>
      <div class="toolbar">
        <button class="btn-example" onclick="loadExample('hello')">
          Hello World
        </button>
        <button class="btn-example" onclick="loadExample('math')">Math</button>
        <button class="btn-example" onclick="loadExample('function')">
          Functions
        </button>
        <button class="btn-example" onclick="loadExample('ifelse')">
          If/Else
        </button>
        <button class="btn-clear" onclick="clearOutput()">Clear</button>
        <button class="btn-run" onclick="runProgram()">&#9654; Run</button>
      </div>
    </header>

    <main>
      <div class="pane editor-pane">
        <div class="pane-header">Code</div>
        <textarea
          id="editor"
          spellcheck="false"
          placeholder="Write your XF code here..."
        >
let greeting = "Hello, World!"
print(greeting)

function add(a, b) {
  return a + b
}

let result = add(3, 4)
print("3 + 4 = " + result)

if (result > 5) {
  print("Result is greater than 5")
} else {
  print("Result is 5 or less")
}</textarea
        >
      </div>
      <div class="pane">
        <div class="pane-header">Output</div>
        <div id="output">
          <div class="output-line output-info">
            Press Run or Ctrl+Enter to execute.
          </div>
        </div>
      </div>
    </main>

    <div class="status-bar">
      <span>XF Language Playground</span>
      <span
        ><span class="kbd">Ctrl</span>+<span class="kbd">Enter</span> to
        run</span
      >
    </div>

    <script src="/playground.js"></script>
    <script>
      const editor = document.getElementById("editor");
      const output = document.getElementById("output");

      const examples = {
        hello: `let name = "World"
print("Hello, " + name + "!")`,

        math: `let a = 10
let b = 3

print("a = " + a)
print("b = " + b)
print("a + b = " + (a + b))
print("a - b = " + (a - b))
print("a * b = " + (a * b))
print("a / b = " + (a / b))`,

        function: `function factorial(n) {
  if (n <= 1) {
    return 1
  }
  return n * factorial(n - 1)
}

print("factorial(5) = " + factorial(5))
print("factorial(10) = " + factorial(10))

function greet(name) {
  return "Hello, " + name + "!"
}

print(greet("XF"))`,

        ifelse: `let x = 42

if (x > 100) {
  print("x is large")
} else {
  if (x > 10) {
    print("x is medium")
  } else {
    print("x is small")
  }
}

let temp = 22
if (temp >= 30) {
  print("It's hot!")
} else {
  if (temp >= 20) {
    print("It's nice outside")
  } else {
    print("It's cold!")
  }
}`,
      };

      function loadExample(name) {
        editor.value = examples[name] || "";
        editor.focus();
      }

      function clearOutput() {
        output.innerHTML = "";
      }

      function addLine(text, className = "") {
        const div = document.createElement("div");
        div.className = "output-line " + className;
        div.textContent = text;
        output.appendChild(div);
      }

      function runProgram() {
        clearOutput();
        const source = editor.value;

        if (!source.trim()) {
          addLine("No code to run.", "output-info");
          return;
        }

        const start = performance.now();
        const result = XF.runCode(source);
        const elapsed = (performance.now() - start).toFixed(2);

        for (const line of result.output) {
          addLine(line);
        }

        if (result.error) {
          addLine("Error: " + result.error, "output-error");
        } else {
          addLine(`\n— Finished in ${elapsed}ms`, "output-success");
        }

        output.scrollTop = output.scrollHeight;
      }

      // Keyboard shortcut: Ctrl+Enter / Cmd+Enter to run
      editor.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          runProgram();
        }

        // Tab support in textarea
        if (e.key === "Tab") {
          e.preventDefault();
          const start = editor.selectionStart;
          const end = editor.selectionEnd;
          editor.value =
            editor.value.substring(0, start) +
            "  " +
            editor.value.substring(end);
          editor.selectionStart = editor.selectionEnd = start + 2;
        }
      });
    </script>
  </body>
</html>
